spring.application.name=sb-expenseTracker
#explicitly enable h2 web based database (enabled by default)
spring.h2.console.enabled=true
#database url to connect to database
spring.datasource.url=jdbc:h2:mem:expense
#allows to see the sql query
spring.jpa.show-sql=true
#sql query in nicer format
spring.jpa.properties.hibernate.format_sql = true